name: Auto Format & Lint on PR

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Prettier format
      - name: Format code (Prettier)
        run: |
          echo "🔧 Running Prettier..."
          npx prettier --write "src/**/*.{ts,html,scss,json}"

      # 5. ESLint fix
      - name: Lint fix (ESLint)
        run: |
          echo "🔍 Running ESLint..."
          npx eslint . --ext .ts,.html --fix

      # 6. Show changed files
      - name: Show changed files
        run: |
          echo "📂 Changed files:"

          if [ -z "$(git status --porcelain)" ]; then
            echo "✅ No changes detected"
          else
            git status --porcelain | while read line; do
              file=$(echo "$line" | awk '{print $2}')
              echo "$file (changed)"
            done
          fi

      # 7. Commit & push if needed
      - name: Commit changes if needed
        run: |
          git config user.name "actions[bot]"
          git config user.email "actions[bot]@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "actions[bot]: ✅ No changes to commit"
          else
            git commit -m "actions[bot]: auto format & lint"
            git push
          fi
