<div class="dashboard-container page-shell">
  <div class="mb-4">
    <h1 class="page-title">{{ i18n.t().dashboard.managerTitle }}</h1>
    <p class="page-subtitle">
      {{
        i18n.format('dashboard.managerSubtitle', {
          firstName: currentUser?.firstName || '',
          lastName: currentUser?.lastName || '',
        })
      }}
    </p>
  </div>

  <!-- Statistiques -->
  <div class="grid">
    <div class="col-12 md:col-6 lg:col-3">
      <app-stat-card
        [label]="i18n.t().dashboard.managerEmployees"
        [value]="totalEmployes()"
        icon="pi-users"
        color="blue"
      ></app-stat-card>
    </div>
    <div class="col-12 md:col-6 lg:col-3">
      <app-stat-card
        [label]="i18n.t().dashboard.managerDemandes"
        [value]="totalDemandes()"
        icon="pi-inbox"
        color="orange"
      ></app-stat-card>
    </div>
    <div class="col-12 md:col-6 lg:col-3">
      <app-stat-card
        [label]="i18n.t().dashboard.managerContrats"
        [value]="totalContrats()"
        icon="pi-file"
        color="green"
      ></app-stat-card>
    </div>
    <div class="col-12 md:col-6 lg:col-3">
      <app-stat-card
        [label]="i18n.t().dashboard.managerDemandesEnCours"
        [value]="demandesEnCours()"
        icon="pi-clock"
        color="purple"
      ></app-stat-card>
    </div>
  </div>

  <!-- Graphiques -->
  <div class="grid mt-4">
    <div class="col-12 lg:col-6">
      <app-doughnut-chart-card
        [title]="i18n.t().dashboard.managerChartDemandes"
        [data]="demandesChartData()"
        [options]="chartOptions"
      ></app-doughnut-chart-card>
    </div>
    <div class="col-12 lg:col-6">
      <app-doughnut-chart-card
        [title]="i18n.t().dashboard.managerChartContrats"
        [data]="contratsChartData()"
        [options]="chartOptions"
      ></app-doughnut-chart-card>
    </div>
  </div>
</div>
