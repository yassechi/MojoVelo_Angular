<div class="contrat-edit-container page-shell">
  <div class="page-header">
    <div class="flex align-items-center gap-3">
      <p-button
        icon="pi pi-arrow-left"
        [text]="true"
        [rounded]="true"
        (onClick)="goBack()"
        [pTooltip]="i18n.t().contrats.backToList"
      ></p-button>
      <div>
        <h1 class="page-title">{{ i18n.t().contrats.create }}</h1>
        <p class="page-subtitle">{{ i18n.t().contrats.createSubtitle }}</p>
      </div>
    </div>
  </div>

  @if (!loading) {
    <p-card>
      <form [formGroup]="contratForm" (ngSubmit)="onSubmit()">
        <div class="grid">
          <div class="col-12 md:col-6">
            <label class="block text-600 mb-2">{{ i18n.t().contrats.reference }} *</label>
            <input type="text" pInputText formControlName="ref" class="w-full" />
          </div>

          <div class="col-12 md:col-6">
            <label class="block text-600 mb-2">{{ i18n.t().contrats.veloLabel }} *</label>
            <p-select
              formControlName="veloId"
              [options]="velos"
              optionLabel="marque"
              optionValue="id"
              [placeholder]="i18n.t().contrats.selectVeloPlaceholder"
              class="w-full"
              [style]="{ width: '100%' }"
            >
              <ng-template let-velo pTemplate="item"
                >{{ velo.marque }} {{ velo.modele }} ({{ velo.numeroSerie }})</ng-template
              >
            </p-select>
          </div>

          <div class="col-12 md:col-6">
            <label class="block text-600 mb-2">{{ i18n.t().contrats.beneficiaire }} *</label>
            <p-select
              formControlName="beneficiaireId"
              [options]="beneficiaires"
              optionLabel="firstName"
              optionValue="id"
              [placeholder]="i18n.t().contrats.selectBeneficiairePlaceholder"
              class="w-full"
              [style]="{ width: '100%' }"
            >
              <ng-template let-user pTemplate="item"
                >{{ user.firstName }} {{ user.lastName }}</ng-template
              >
            </p-select>
          </div>

          <div class="col-12 md:col-6">
            <label class="block text-600 mb-2">{{ i18n.t().contrats.responsableRh }} *</label>
            <p-select
              formControlName="userRhId"
              [options]="responsablesRh"
              optionLabel="firstName"
              optionValue="id"
              [placeholder]="i18n.t().contrats.selectRhPlaceholder"
              class="w-full"
              [style]="{ width: '100%' }"
            >
              <ng-template let-user pTemplate="item"
                >{{ user.firstName }} {{ user.lastName }}</ng-template
              >
            </p-select>
          </div>

          <div class="col-12 md:col-6">
            <label class="block text-600 mb-2">{{ i18n.t().contrats.dateDebut }} *</label>
            <p-datepicker
              formControlName="dateDebut"
              dateFormat="dd/mm/yy"
              [showIcon]="true"
              class="w-full"
              [style]="{ width: '100%' }"
            ></p-datepicker>
          </div>

          <div class="col-12 md:col-6">
            <label class="block text-600 mb-2">{{ i18n.t().contrats.dateFin }} *</label>
            <p-datepicker
              formControlName="dateFin"
              dateFormat="dd/mm/yy"
              [showIcon]="true"
              class="w-full"
              [style]="{ width: '100%' }"
            ></p-datepicker>
          </div>

          <div class="col-12 md:col-6">
            <label class="block text-600 mb-2">{{ i18n.t().contrats.duree }} *</label>
            <p-inputnumber
              formControlName="duree"
              class="w-full"
              [style]="{ width: '100%' }"
            ></p-inputnumber>
          </div>

          <div class="col-12 md:col-6">
            <label class="block text-600 mb-2">{{ i18n.t().contrats.loyerMensuel }} (€) *</label>
            <p-inputnumber
              formControlName="loyerMensuelHT"
              mode="decimal"
              [minFractionDigits]="2"
              class="w-full"
              [style]="{ width: '100%' }"
            ></p-inputnumber>
          </div>

          <div class="col-12 md:col-6">
            <label class="block text-600 mb-2">{{ i18n.t().contrats.statut }} *</label>
            <p-select
              formControlName="statutContrat"
              [options]="statutOptions()"
              optionLabel="label"
              optionValue="value"
              [placeholder]="i18n.t().contrats.selectStatutPlaceholder"
              class="w-full"
              [style]="{ width: '100%' }"
            ></p-select>
          </div>
        </div>

        <div class="flex gap-2 justify-content-end mt-4">
          <p-button
            [label]="i18n.t().common.annuler"
            severity="secondary"
            (onClick)="goBack()"
            type="button"
          ></p-button>
          <p-button
            [label]="i18n.t().common.enregistrer"
            icon="pi pi-check"
            type="submit"
            [disabled]="contratForm.invalid"
          ></p-button>
        </div>
      </form>
    </p-card>
  }

  @if (loading) {
    <div class="text-center py-8">
      <i class="pi pi-spin pi-spinner" style="font-size: 3rem; color: #1e3a8a"></i>
      <p class="mt-3 text-600">{{ i18n.t().common.chargement }}</p>
    </div>
  }
</div>
