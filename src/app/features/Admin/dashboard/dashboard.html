<div class="dashboard-container page-shell">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ i18n.t().dashboard.title }}</h1>
      <p class="page-subtitle">{{ i18n.t().dashboard.subtitle }}</p>
    </div>
  </div>

  <div class="grid">
    <div class="col-12 md:col-4">
      <app-stat-card
        [label]="i18n.t().dashboard.pendingDemandes"
        [value]="stats().pendingDemandes"
        icon="pi-inbox"
        color="orange"
      ></app-stat-card>
    </div>
    <div class="col-12 md:col-4">
      <app-stat-card
        [label]="i18n.t().dashboard.activeContrats"
        [value]="stats().activeContrats"
        icon="pi-file"
        color="green"
      ></app-stat-card>
    </div>
    <div class="col-12 md:col-4">
      <app-stat-card
        [label]="i18n.t().dashboard.expiringContrats"
        [value]="stats().expiringContrats"
        icon="pi-clock"
        color="purple"
      ></app-stat-card>
    </div>
  </div>

  <div class="grid mt-4 dashboard-insights">
    <div class="col-12 lg:col-7">
      <div class="grid dashboard-charts">
        <div class="col-12 md:col-6">
          <app-doughnut-chart-card
            [title]="i18n.t().dashboard.demandesByStatus"
            [data]="demandeStatusChartData()"
            [options]="donutChartOptions"
            cssClass="mojo-chart--fill"
            height="100%"
          ></app-doughnut-chart-card>
        </div>
        <div class="col-12 md:col-6">
          <app-doughnut-chart-card
            [title]="i18n.t().dashboard.contratsByStatus"
            [data]="contratStatusChartData()"
            [options]="donutChartOptions"
            cssClass="mojo-chart--fill"
            height="100%"
          ></app-doughnut-chart-card>
        </div>
      </div>
    </div>

    <div class="col-12 lg:col-5">
      <p-card class="section-card activity-card">
        <ng-template pTemplate="header">
          <div class="p-3">
            <h3 class="m-0 chart-title">{{ i18n.t().dashboard.recentDemandes }}</h3>
          </div>
        </ng-template>
        <div class="activity-list">
          @if (activityFeedView().length === 0) {
            <div class="text-600">{{ i18n.t().dashboard.noActivity }}</div>
          } @else {
            @for (item of activityFeedView(); track $index) {
              <div class="activity-item">
                <div>
                  <div class="font-semibold">{{ item.title }}</div>
                  <div class="text-600 text-sm">{{ item.detail }}</div>
                </div>
                <span class="activity-time">{{ item.time }}</span>
              </div>
            }
          }
        </div>
      </p-card>
    </div>
  </div>

  <div class="grid mt-4 ai-section">
    <div class="col-12">
      <div class="grid ai-docs-grid">
        <div class="col-12 lg:col-6">
          <app-ai-pdf-uploader
            [config]="{
              cardTitle: i18n.t().ai.docsAdminTitle,
              dropTitle: i18n.t().ai.dropTitleAdmin,
              ariaLabel: i18n.t().ai.choosePdf
            }"
            [uploadedFiles]="uploadedAiFiles()"
            [uploadLoading]="uploadLoading()"
            [listLoading]="uploadedListLoading()"
            [lastSummary]="lastUploadSummary()"
            (uploadFiles)="uploadAiFiles($event)"
            (deleteFile)="deleteUploadedAiFile($event)"
            (requestFileList)="loadUploadedAiFiles()"
          ></app-ai-pdf-uploader>
        </div>
        <div class="col-12 lg:col-6">
          <app-ai-pdf-uploader
            [config]="{
              cardTitle: i18n.t().ai.docsClientTitle,
              dropTitle: i18n.t().ai.dropTitleClient,
              ariaLabel: i18n.t().ai.choosePdfClient
            }"
            [uploadedFiles]="uploadedClientAiFiles()"
            [uploadLoading]="uploadClientLoading()"
            [listLoading]="uploadedClientListLoading()"
            [lastSummary]="lastClientUploadSummary()"
            (uploadFiles)="uploadClientAiFiles($event)"
            (deleteFile)="deleteUploadedClientAiFile($event)"
            (requestFileList)="loadUploadedClientAiFiles()"
          ></app-ai-pdf-uploader>
        </div>
      </div>
    </div>

    <div class="col-12">
      <app-ai-chat></app-ai-chat>
    </div>
  </div>

  <p-confirmDialog></p-confirmDialog>
</div>
