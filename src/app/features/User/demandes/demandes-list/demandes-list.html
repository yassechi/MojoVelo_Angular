<div class="demandes-container page-shell">
  <app-page-header [title]="i18n.t().demandes.myTitle" [subtitle]="i18n.t().demandes.mySubtitle">
    <p-button [label]="i18n.t().demandes.create" icon="pi pi-plus" (click)="onCreate()"></p-button>
  </app-page-header>

  <div class="grid">
    <div class="col-12">
      <p-card>
        <p-table
          [value]="demandes()"
          [loading]="loading()"
          [paginator]="true"
          [rows]="10"
          [showCurrentPageReport]="true"
          [currentPageReportTemplate]="i18n.t().demandes.reportTemplate"
          [rowsPerPageOptions]="[10, 25, 50]"
          class="p-datatable-striped"
        >
          <ng-template pTemplate="header">
            <tr>
              <th pSortableColumn="id">ID <p-sortIcon field="id"></p-sortIcon></th>
              <th>{{ i18n.t().demandes.velo }}</th>
              <th>{{ i18n.t().demandes.statut }}</th>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-demande>
            <tr class="clickable-row" (click)="onView(demande)">
              <td>{{ demande.id }}</td>
              <td>
                {{ (demande.veloMarque + ' ' + demande.veloModele).trim() || '#' + demande.idVelo }}
              </td>
              <td>
                <div class="status-with-indicator">
                  <app-demande-statut-tag [statut]="demande.status"></app-demande-statut-tag>
                  @if (hasUnreadMessages(demande)) {
                    <span
                      class="unread-indicator"
                      [pTooltip]="i18n.t().demandes.nouveauMessage"
                      tooltipPosition="top"
                    ></span>
                  }
                </div>
              </td>
            </tr>
          </ng-template>

          <ng-template pTemplate="emptymessage">
            <app-empty-table [message]="i18n.t().demandes.userEmpty" [colspan]="3" />
          </ng-template>
        </p-table>
      </p-card>
    </div>
  </div>
</div>
