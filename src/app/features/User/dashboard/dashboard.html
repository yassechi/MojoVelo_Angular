<div class="dashboard-container page-shell">
  <div class="mb-4">
    <h1 class="page-title">{{ i18n.t().dashboard.userTitle }}</h1>
    <p class="page-subtitle">
      {{ i18n.t().dashboard.userSubtitle }} {{ currentUser?.firstName }} {{ currentUser?.lastName }}
    </p>
  </div>

  <div class="grid">
    <div class="col-12 md:col-6 lg:col-3">
      <app-stat-card
        [label]="i18n.t().dashboard.myDemandes"
        [value]="totalDemandes()"
        icon="pi-inbox"
        color="purple"
      ></app-stat-card>
    </div>
    <div class="col-12 md:col-6 lg:col-3">
      <app-stat-card
        [label]="i18n.t().dashboard.demandesEnCours"
        [value]="demandesEnCours()"
        icon="pi-clock"
        color="blue"
      ></app-stat-card>
    </div>
    <div class="col-12 md:col-6 lg:col-3">
      <app-stat-card
        [label]="i18n.t().dashboard.myContrats"
        [value]="totalContrats()"
        icon="pi-file"
        color="orange"
      ></app-stat-card>
    </div>
    <div class="col-12 md:col-6 lg:col-3">
      <app-stat-card
        [label]="i18n.t().dashboard.contratsActifs"
        [value]="contratsActifs()"
        icon="pi-check-circle"
        color="green"
      ></app-stat-card>
    </div>
  </div>

  <div class="grid mt-4">
    <div class="col-12 lg:col-6">
      <app-doughnut-chart-card
        [title]="i18n.t().dashboard.userDemandesByStatus"
        [data]="demandesChartData()"
        [options]="chartOptions"
      ></app-doughnut-chart-card>
    </div>
    <div class="col-12 lg:col-6">
      <app-doughnut-chart-card
        [title]="i18n.t().dashboard.userContratsByStatus"
        [data]="contratsChartData()"
        [options]="chartOptions"
      ></app-doughnut-chart-card>
    </div>
  </div>
</div>
