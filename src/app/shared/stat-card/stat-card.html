<p-card class="shadow-2 stat-card-wrapper">
  <div class="flex align-items-center justify-content-between">
    <div>
      <div class="text-500 font-medium mb-2">{{ label }}</div>
      <div class="text-900 font-bold text-4xl">{{ value }}</div>
    </div>
    <div
      class="flex align-items-center justify-content-center border-round stat-icon"
      [ngClass]="bgClass"
    >
      <i class="pi text-xl" [ngClass]="[icon, iconColorClass]"></i>
    </div>
  </div>
</p-card>
