<div class="contrat-detail-container page-shell">
  <div class="page-header">
    <div class="flex align-items-center gap-3">
      <p-button icon="pi pi-arrow-left" [text]="true" [rounded]="true" (onClick)="goBack()" [pTooltip]="i18n.t().contrats.backToList"></p-button>
      <div>
        <h1 class="page-title">{{ i18n.t().contrats.contratLabel }} {{ contrat?.ref }}</h1>
        <p class="page-subtitle">{{ i18n.t().contrats.detailSubtitle }}</p>
      </div>
    </div>
    <div class="flex gap-2 align-items-center">
      @if (contrat; as c) {
        <p-tag [value]="getStatutLabel(c.statutContrat)" [severity]="getStatutSeverity(c.statutContrat)" class="text-lg"></p-tag>
      }
    </div>
  </div>

  @if (contrat) {
    <div class="section-card p-2 contract-tabs">
      <div class="contract-tablist" role="tablist">
        @for (tab of tabs; track tab.route) {
          <a
            class="contract-tab"
            role="tab"
            [routerLink]="[tab.route]"
            routerLinkActive="is-active"
          >
            <i [ngClass]="tab.icon"></i>
            <span>{{ tab.label }}</span>
          </a>
        }
      </div>
    </div>

    <router-outlet></router-outlet>

  } @else if (loading) {
    <div class="text-center py-8">
      <i class="pi pi-spin pi-spinner" style="font-size: 3rem; color: #1e3a8a"></i>
      <p class="mt-3 text-600">{{ i18n.t().common.chargement }}</p>
    </div>
  }
</div>

<p-confirmDialog></p-confirmDialog>
